name: Build & Deploy to GitHub Pages

# Crawls fresh AI data, builds the static site, and publishes it to GitHub Pages.
# Runs on every push to main, daily on a schedule, and on manual dispatch — so the
# public site at https://aisearches.cc/ always serves real data
# with zero servers to run.
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 22 * * *" # daily ~22:17 UTC (off-peak minute)
  workflow_dispatch: {}

permissions:
  contents: write # commit the refreshed snapshot back to the repo
  pages: write # publish to GitHub Pages
  id-token: write # OIDC token required by deploy-pages

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run tests
        run: npm test

      - name: Crawl AI sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # raises GitHub API rate limit
          CRAWL_ARXIV: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # one-line AI notes (optional; skipped if unset)
        run: npm run crawl || echo "crawl reported issues; building with the last good snapshot"

      - name: Commit refreshed snapshot (best-effort)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/items.json data/meta.json data/digest.json data/archive || true
          if git diff --staged --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore(data): refresh crawled snapshot [skip ci]"
            git push || echo "snapshot push skipped"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true # auto-enable Pages (source = GitHub Actions) on first run

      - name: Build static export
        env:
          NEXT_PUBLIC_ASK_AI_URL: ${{ vars.ASK_AI_URL }}
          DATA_SOURCE: local
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
