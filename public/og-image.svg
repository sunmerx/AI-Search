<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" fill="none">
  <rect width="1200" height="630" fill="#0f1219"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#1a1f2e" stroke="#2d3548" stroke-width="1"/>
  <!-- Brand bar -->
  <rect x="40" y="40" width="1120" height="6" rx="3" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b6cff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Logo mark -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="#3b6cff"/>
  <text x="92" y="115" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="white">A</text>
  <!-- Title -->
  <text x="144" y="113" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#e5e7eb">AI Search</text>
  <text x="310" y="113" font-family="system-ui,sans-serif" font-size="16" fill="#9ca3af">AI 行业资讯聚合</text>
  <!-- Main headline -->
  <text x="80" y="220" font-family="system-ui,sans-serif" font-size="48" font-weight="bold" fill="white">每天自动聚合全网 AI 资讯</text>
  <text x="80" y="285" font-family="system-ui,sans-serif" font-size="48" font-weight="bold" fill="white">带 AI 解读 · 可个性化 · 可检索</text>
  <!-- Subtitle -->
  <text x="80" y="350" font-family="system-ui,sans-serif" font-size="20" fill="#9ca3af">20+ 公开来源 · 每日自动更新 · 纯静态零成本 · Fork 即用</text>
  <!-- Feature pills -->
  <rect x="80" y="400" width="100" height="32" rx="16" fill="#3b6cff" fill-opacity="0.2"/>
  <text x="105" y="421" font-family="system-ui,sans-serif" font-size="13" fill="#3b6cff">AI 点评</text>
  <rect x="196" y="400" width="100" height="32" rx="16" fill="#10b981" fill-opacity="0.2"/>
  <text x="218" y="421" font-family="system-ui,sans-serif" font-size="13" fill="#10b981">每日日报</text>
  <rect x="312" y="400" width="100" height="32" rx="16" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="334" y="421" font-family="system-ui,sans-serif" font-size="13" fill="#f59e0b">话题追踪</text>
  <rect x="428" y="400" width="100" height="32" rx="16" fill="#8b5cf6" fill-opacity="0.2"/>
  <text x="450" y="421" font-family="system-ui,sans-serif" font-size="13" fill="#8b5cf6">趋势洞察</text>
  <rect x="544" y="400" width="100" height="32" rx="16" fill="#ec4899" fill-opacity="0.2"/>
  <text x="572" y="421" font-family="system-ui,sans-serif" font-size="13" fill="#ec4899">暗色模式</text>
  <!-- Decorative chart lines -->
  <polyline points="700,480 750,460 800,470 850,440 900,450 950,420 1000,430 1050,400 1100,410" stroke="#3b6cff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <polyline points="700,510 750,500 800,490 850,505 900,480 950,490 1000,470 1050,460 1100,450" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- URL -->
  <text x="80" y="555" font-family="system-ui,monospace" font-size="14" fill="#6b7280">keyuchen-del.github.io/AI-Search</text>
